services:
  - type: web
    name: new-car-rent
    runtime: java
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/*.jar"
    envVars:
      - key: DB_URL
        value: "jdbc:mysql://YOUR_DB_HOST:3306/car_rental"
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: manas@9546