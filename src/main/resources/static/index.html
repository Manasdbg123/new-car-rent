<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">

	<meta name="viewport"
		  content="width=device-width, initial-scale=1.0">

	<title>DriveX - Premium Car Rental</title>

	<link rel="stylesheet"
		  href="/css/style.css">

</head>

<body>

<!-- =========================================
NAVBAR
========================================= -->

<nav class="navbar">

	<div class="logo">
		🚘 DriveX
	</div>

	<div class="nav-links">

		<a href="#home">Home</a>

		<a href="#cars">Cars</a>

		<a href="#contact">Contact</a>

	</div>

	<div class="auth-buttons">

		<button class="btn login-btn">
			Login
		</button>

		<button class="btn register-btn">
			Register
		</button>

	</div>

</nav>

<!-- =========================================
HERO
========================================= -->

<section class="hero" id="home">

	<div class="hero-content">

		<h1>
			Premium Cars
			<br>
			For Every Journey
		</h1>

		<p>
			Luxury rentals made simple and fast.
		</p>

		<div class="hero-buttons">

			<button class="btn primary-btn">
				Explore Cars
			</button>

		</div>

	</div>

</section>

<!-- =========================================
CARS
========================================= -->

<section class="cars-section" id="cars">

	<div class="section-title">

		<h2>Popular Cars</h2>

	</div>

	<div class="cars-grid">

		<div class="car-card">

			<div class="car-info">

				<h3>BMW M4</h3>

				<p>Luxury Sports Car</p>

				<button class="btn book-btn">
					Book Now
				</button>

			</div>

		</div>

		<div class="car-card">

			<div class="car-info">

				<h3>Audi A6</h3>

				<p>Premium Sedan</p>

				<button class="btn book-btn">
					Book Now
				</button>

			</div>

		</div>

	</div>

</section>

<!-- =========================================
LOGIN MODAL
========================================= -->

<div class="modal" id="loginModal">

	<div class="modal-content">

        <span class="close-btn"
			  id="closeLogin">
            &times;
        </span>

		<h2>Login</h2>

		<form id="loginForm">

			<input type="email"
				   id="loginEmail"
				   placeholder="Email"
				   required>

			<input type="password"
				   id="loginPassword"
				   placeholder="Password"
				   required>

			<button type="submit"
					class="btn primary-btn">
				Login
			</button>

		</form>

	</div>

</div>

<!-- =========================================
REGISTER MODAL
========================================= -->

<div class="modal" id="registerModal">

	<div class="modal-content">

        <span class="close-btn"
			  id="closeRegister">
            &times;
        </span>

		<h2>Register</h2>

		<form id="registerForm">

			<input type="text"
				   id="registerName"
				   placeholder="Full Name"
				   required>

			<input type="email"
				   id="registerEmail"
				   placeholder="Email"
				   required>

			<input type="password"
				   id="registerPassword"
				   placeholder="Password"
				   required>

			<button type="submit"
					class="btn primary-btn">
				Register
			</button>

		</form>

	</div>

</div>

<footer class="footer" id="contact">

	<p>
		© 2026 DriveX Car Rental
	</p>

</footer>

<script src="/js/app.js"></script>

</body>

</html>
